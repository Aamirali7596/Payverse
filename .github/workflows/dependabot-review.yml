name: Dependabot PR Review

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write

jobs:
  review-dependabot:
    name: Review Dependabot PR
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Get PR diff
        run: gh pr diff ${{ github.event.pull_request.number }} > /tmp/pr.diff
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: pip install black flake8 mypy

      - name: Run formatting check
        working-directory: backend
        run: black --check --line-length 127 . || true

      - name: Run lint with flake8
        working-directory: backend
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true

      - name: Run PR Reviewer
        id: review
        run: |
          python -m skills.pr_reviewer --diff-file /tmp/pr.diff >> review.txt
        continue-on-error: true

      - name: Post review comment
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('review.txt', 'utf8');
            const verdict = review.includes('Verdict: Request Changes') ? '⚠️' : '✅';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## ${verdict} Auto-Review: Dependabot PR\n\n${review}\n\n---\n*Generated by TaxionLab PR Reviewer*`
            });

      - name: Auto-approve
        if: "!contains(steps.review.outputs.verdict, 'Request Changes')"
        run: gh pr review --approve ${{ github.event.pull_request.number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge
        if: "github.event.pull_request.auto_merge == null && !contains(steps.review.outputs.verdict, 'Request Changes')"
        run: gh pr merge --squash --auto ${{ github.event.pull_request.number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
